name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🟢 Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build

      - name: 📁 Prepare Files for Deployment
        run: |
          # The FTP-Deploy action syncs a single folder. 
          # We copy the api/ folder into dist/ so we can deploy dist/ as our web root.
          cp -r api dist/api
          
          # Remove any temporary or dev files from the API folder just in case
          rm -rf dist/api/.env dist/api/tests

      - name: 🚀 Sync Files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
